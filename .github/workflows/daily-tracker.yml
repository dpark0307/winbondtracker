name: Daily Winbond Price Tracker

on:
  schedule:
    # Runs every day at 4:00 AM UTC.
    # Adjust the hour below if you want a different time -
    # this is UTC, not your local time.
    - cron: "0 4 * * *"
  workflow_dispatch: {}  # lets you also trigger it manually from the Actions tab

jobs:
  track-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run price tracker
        env:
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
        run: python track_prices.py

      - name: Commit updated prices.csv back to the repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.csv
          git diff --staged --quiet || git commit -m "Daily price update $(date -u +'%Y-%m-%d')"
          git push
